---
- name: Initial configuration to bootstrap Proxmox
  hosts: pve
  become: yes

  tasks:
    - name: Ensure system is up to date
      ansible.builtin.apt:
        upgrade: dist
        update_cache: yes
      tags:
        - [update]


---
- name: Configure Proxmox Internal NAT Bridge
  hosts: pve
  become: true
  tasks:
    - name: Ensure vmbr1 configuration exists in interfaces file
      blockinfile:
        path: /etc/network/interfaces
        marker: "# {mark} ANSIBLE MANAGED BLOCK: vmbr1 NAT"
        block: |
          auto vmbr1
          iface vmbr1 inet static
              address 10.10.10.1/24
              bridge-ports none
              bridge-stp none
              bridge-fd 0
              post-up echo 1 > /proc/sys/net/ipv4/ip_forward
              post-up iptables -t nat -A POSTROUTING -s '10.100.0.0/24' -o vmbr0 -j MASQUERADE
              post-down iptables -t nat -D POSTROUTING -s '10.100.0.0/24' -o vmbr0 -j MASQUERADE
      register: network_config

    - name: Enable IP Forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        sysctl_set: true
        state: present
        reload: true

    - name: Apply network changes
      shell: ifup vmbr1
      when: network_config.changed

---
- name: Proxmox Host Optimization and Storage Setup
  hosts: pve
  become: true
  tasks:
    - name: Set vm.swappiness to 10
      sysctl:
        name: vm.swappiness
        value: '10'
        state: present
        sysctl_file: /etc/sysctl.conf
        reload: yes

    - name: Disable High Availability and Clustering services
      systemctl:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop:
        - pve-ha-crm.service
        - pve-ha-lrm.service
        - corosync.service

    - name: Mask sleep and suspend targets
      systemctl:
        name: "{{ item }}"
        masked: yes
      loop:
        - sleep.target
        - suspend.target
        - hibernate.target
        - hybrid-sleep.target

    - name: Enable and start fstrim.service
      systemctl:
        name: fstrim.timer
        state: started
        enabled: yes

    - name: Extend pve/data to use 100% of free space
      lvextend:
        lv: pve/data
        size: +100%FREE

---
- name: Proxmox Power & CPU Optimization
  hosts: proxmox_nodes
  become: true
  tasks:

    - name: Install ACPI support packages
      apt:
        name:
          - acpi-support
          - acpid
          - acpi
        state: present
        update_cache: yes

    # TODO: this probably should be somewhere else
    - name: Install lm-sensors
      apt:
        name: lm-sensors
        state: present

    # TODO: this probably should be somewhere else
    - name: Configure sensors (non-interactive)
      shell: yes "" | sensors-detect
      changed_when: false

    - name: Install AMD Microcode updates
      apt:
        name: amd64-microcode
        state: present

    - name: Set CPU Vendor fact
      set_fact:
        cpu_vendor: "{{ 'intel' if 'Intel' in ansible_processor else 'amd' if 'AuthenticAMD' in ansible_processor else 'unknown' }}"

    - name: Disable intel_pstate in GRUB
      lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT="(.*)"'
        line: 'GRUB_CMDLINE_LINUX_DEFAULT="\1 intel_pstate=disable"'
        backrefs: yes
      when: cpu_vendor == "intel"
      register: grub_updated

    - name: AMD | Ensure amd_pstate is set to active in GRUB
      lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT="(.*)"'
        line: 'GRUB_CMDLINE_LINUX_DEFAULT="\1 amd_pstate=active"'
        backrefs: yes
      when: cpu_vendor == "amd"
      register: grub_amd

    - name: Update GRUB
      command: update-grub
      when: grub_updated.changed

    - name: Reboot host if GRUB was changed
      reboot:
        msg: "Rebooting to apply intel_pstate=disable"
        reboot_timeout: 600
      when: grub_updated.changed

    - name: Set CPU governor to conservative on boot via Cron
      cron:
        name: "Set CPU Governor"
        special_time: reboot
        job: 'echo "conservative" | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor'
      when: cpu_vendor == "intel"

    - name: AMD | Set Governor to Powersave (Modern AMD standard)
      cron:
        name: "Set AMD Governor"
        special_time: reboot
        job: 'echo "powersave" | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor'
      when: cpu_vendor == "amd"

---
- name: Proxmox Repository and Update Management
  hosts: pve
  become: true
  tasks:

    - name: Disable the pve-enterprise repository
      apt_repository:
        repo: "deb https://enterprise.proxmox.com/debian/pve {{ ansible_distribution_release }} pve-enterprise"
        state: absent

    - name: Disable the ceph-enterprise repository (if exists)
      apt_repository:
        repo: "deb https://enterprise.proxmox.com/debian/ceph-quincy {{ ansible_distribution_release }} enterprise"
        state: absent

    - name: Add Proxmox No-Subscription repository
      apt_repository:
        repo: "deb http://download.proxmox.com/debian/pve {{ ansible_distribution_release }} pve-no-subscription"
        state: present
        update_cache: yes

    - name: Perform full system upgrade (dist-upgrade)
      apt:
        upgrade: dist
        update_cache: yes
      register: upgrade_result

    - name: Install PowerTop
      apt:
        name: powertop
        state: present

    - name: Enable PowerTop Auto-Tune on boot
      cron:
        name: "PowerTop Auto-Tune"
        special_time: reboot
        job: "/usr/sbin/powertop --auto-tune"

---
- name: Remove No-Subscription Pop-up nag
  hosts: pve
  become: yes
  tasks:
    - name: Remove Proxmox 7 & 8 Subscription Nag
      replace:
        path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
        regexp: 'res\.data\.status\.toLowerCase\(\) !== ''active'''
        replace: 'false'
      notify: Restart PVE Proxy

    - name: Remove Proxmox 9.x Subscription Nag
      replace:
        path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
        regexp: 'if \(res\.data\.status\.toLowerCase\(\) !== ''active''\) \{'
        replace: 'if (false) {'
      notify: Reload PVE

  handlers:
    - name: Restart PVE Proxy
      systemctl:
        name: pveproxy
        state: restarted

---
- name: Remove local-lvm volume
  hosts: pve
  become: yes
  tasks:
    - name: Remove local-lvm from Proxmox storage configuration
      command: pvesm remove local-lvm
      register: pve_remove_storage
      failed_when: false

    - name: Delete the Logical Volume for data
      lvol:
        vg: pve
        lv: data
        state: absent
        force: yes

    - name: Resize the root Logical Volume to 100% of free space
      lvol:
        vg: pve
        lv: root
        size: +100%FREE
        resizefs: yes

    # - name: Update 'local' storage to allow all content types
    #   command: pvesm set local --content backup,iso,vztmpl,rootdir,images,snippets
