---
- name: Download and deploy Portainer
  hosts: portainer
  become: yes

  tasks:
    - name: Ensure system is up to date
      ansible.builtin.apt:
        upgrade: dist
        update_cache: yes
      tags:
        - update

    - name: Deploy Portainer
      include_role:
        name: docker_service_deploy
      vars:
        service_name: portainer

    - name: Deploy Watchtower (community fork)
      include_role:
        name: docker_service_deploy
      vars:
        service_name: watchtower
