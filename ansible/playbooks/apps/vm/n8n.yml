---
- name: Download and deploy n8n
  hosts: n8n
  become: yes

  tasks:
    - name: Ensure system is up to date
      ansible.builtin.apt:
        upgrade: dist
        update_cache: yes
      tags:
        - update

    - name: Ensure required packages are installed
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Detect OS and architecture for Docker
      ansible.builtin.set_fact:
        docker_distro: "{{ 'debian' }}"
        docker_arch: "{{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else 'arm64' if ansible_facts['architecture'] == 'aarch64' else ansible_facts['architecture'] }}"

    - name: Create directory for GPG keyrings
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker's official GPG key
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ docker_distro }}/gpg"
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker repository to Apt sources
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ docker_distro }} {{ ansible_facts['distribution_release'] }} stable"
        state: present
        filename: docker

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker service is running (for verification)
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Verify Docker is installed and running
      ansible.builtin.command: docker --version
      register: docker_version_output
      changed_when: false

    - name: Display Docker version
      ansible.builtin.debug:
        var: docker_version_output.stdout

    - name: Deploy Portainer Agent
      include_role:
        name: docker_service_deploy
      vars:
        service_name: portainer_agent

    - name: Deploy n8n
      include_role:
        name: docker_service_deploy
      vars:
        service_name: n8n
