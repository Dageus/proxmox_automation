---
- name: Download and deploy my Blog (Hugo)
  hosts: blog
  become: yes

  tasks:
    - name: Ensure system is up to date
      ansible.builtin.apt:
        upgrade: dist
        update_cache: yes
      tags:
        - update

    - name: Deploy Portainer Agent
      include_role:
        name: docker_service_deploy
      vars:
        service_name: portainer_agent

    - name: Deploy Hugo
      include_role:
        name: docker_service_deploy
      vars:
        service_name: blog
