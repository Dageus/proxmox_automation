---
- name: Download and deploy Actual Budget
  hosts: actual-budget
  become: yes

  tasks:
    - name: Ensure system is up to date
      ansible.builtin.apt:
        upgrade: dist
        update_cache: yes
      tags:
        - update

    - name: Deploy Portainer Agent
      include_role:
        name: docker_service_deploy
      vars:
        service_name: portainer_agent

    - name: Deploy actual_budget
      include_role:
        name: docker_service_deploy
      vars:
        service_name: actual_budget
