---
- name: Download and deploy Nextcloud
  hosts: nextcloud
  become: yes

  tasks:
    - name: Ensure system is up to date
      ansible.builtin.apt:
        upgrade: dist
        update_cache: yes
      tags:
        - update

    - name: Deploy Portainer Agent
      include_role:
        name: docker_service_deploy
      vars:
        service_name: portainer_agent

    - name: Deploy nextcloud
      include_role:
        name: docker_service_deploy
      vars:
        service_name: nextcloud
