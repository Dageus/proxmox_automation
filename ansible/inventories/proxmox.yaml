---
plugin: community.proxmox.proxmox
url: "https://192.168.1.93:8006"
user: "root@pam"
# Fetch from .env
token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"

validate_certs: false
want_facts: true
want_proxmox_nodes_ansible_host: true

filters:
  - proxmox_status == "running"
  - template | default(false) == false

strict: false
keyed_groups:
  - prefix: tag
    key: proxmox_tags_parsed
  - prefix: type
    key: proxmox_vmtype

compose:
  ansible_host: proxmox_lxc_interfaces[1].inet | split('/') | first
