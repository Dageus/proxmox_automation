---
- name: Create Terraform Admin role
  ansible.builtin.shell: >
    pveum role add TerraformAdmin -privs
    "VM.Allocate VM.Clone VM.Config.CDROM VM.Config.Cloudinit VM.Config.CPU
    VM.Config.Disk VM.Config.HWType VM.Config.Memory VM.Config.Network
    VM.Config.Options VM.Monitor VM.Audit VM.PowerMgmt Datastore.Allocate
    Datastore.AllocateSpace Datastore.Audit SDN.Use Sys.Audit Sys.Modify"
  register: role_result
  failed_when:
    - role_result.rc != 0
    - "'already exists' not in role_result.stderr"
  changed_when: role_result.rc == 0

- name: Debug Variable Visibility
  ansible.builtin.debug:
    msg: "The user is {{ pve_api_user }} and the password variable is defined: {{ pve_api_password is defined }}"

- name: Create Terraform Service User
  ansible.builtin.shell: |
    pveum user add {{ pve_api_user }}@pve --password "{{ pve_api_password }}"
  register: user_creation
  failed_when:
    - user_creation.rc != 0
    - "'already exists' not in user_creation.stderr"
  changed_when: user_creation.rc == 0

- name: Assign TerraformAdmin role to Service User at Datacenter root
  ansible.builtin.shell: >
    pveum acl modify / -user {{ pve_api_user }}@pve -role TerraformAdmin
  register: acl_result
  changed_when: acl_result.rc == 0

- name: Check if API Token exists
  ansible.builtin.shell: "pveum user token list {{ pve_api_user }}@pve | grep -q '{{ pve_api_token_name }}'"
  register: token_check
  failed_when: false
  changed_when: false

- name: Generate API Token
  ansible.builtin.shell: "pveum user token add {{ pve_api_user }}@pve {{ pve_api_token_name }} --privsep 0"
  register: token_output
  when:
    - token_check.rc != 0
    - not pve_create_root_api_token
  no_log: false

- name: Extract Token Secret and Save to Vault
  delegate_to: localhost
  run_once: true
  ansible.builtin.shell: |
    SECRET=$(echo '{{ token_output.stdout }}' | grep -oE '[a-f0-9]{8}-([a-f0-9]{4}-){3}[a-f0-9]{12}')
    mkdir -p ../group_vars/proxmox_nodes
    echo "vault_proxmox_token: \"$SECRET\"" > ../group_vars/proxmox_nodes/vault_token.yml
    ansible-vault encrypt ../group_vars/proxmox_nodes/vault_token.yml
  when:
    - token_output is changed
    - token_output.stdout is defined
    - not pve_create_root_api_token

- name: Generate Root API Token
  ansible.builtin.shell: "pveum user token add root@pam automation --privsep 0"
  register: root_token_output
  failed_when:
    - root_token_output.rc != 0
    - "'already exists' not in root_token_output.stderr"
  changed_when: root_token_output.rc == 0
  when: pve_create_root_api_token

- name: Extract and Save Root Token
  delegate_to: localhost
  run_once: true
  ansible.builtin.shell: |
    SECRET=$(echo '{{ root_token_output.stdout }}' | grep -oE '[a-f0-9]{8}-([a-f0-9]{4}-){3}[a-f0-9]{12}')
    mkdir -p ../group_vars/proxmox_nodes
    echo "vault_proxmox_token: \"$SECRET\"" > ../group_vars/proxmox_nodes/vault_token.yml
    ansible-vault encrypt ../group_vars/proxmox_nodes/vault_token.yml
  when:
    - root_token_output is changed
    - pve_create_root_api_token

- name: DISPLAY API TOKEN SECRET
  debug:
    msg: "SECRET: {{ token_output.stdout_lines | select('match', '.*value:.*') | list }}"
  when: token_check.rc == 0 and token_output is changed

- name: Ensure Ansible SSH keypair exists on local machine
  openssh_keypair:
    path: "~/.ssh/ansible"
    type: ed25519
    comment: "ansible-svc-key"
  delegate_to: localhost
  run_once: true

- name: Ensure SSH Key is authorized for root
  ansible.posix.authorized_key:
    user: root
    state: present
    key: "{{ lookup('file', '~/.ssh/ansible.pub') }}"

- name: Disable Password Authentication for SSH
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
  notify: Restart SSH
