---
- name: Deploy dynamic Proxmox network configuration
  ansible.builtin.template:
    src: templates/interfaces_aoostar.j2
    dest: /etc/network/interfaces
    backup: yes
  register: network_config

- name: Enable global IP Forwarding for NAT routing
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes

- name: Apply network changes instantly
  ansible.builtin.command: ifreload -a
  when: network_config.changed
