---
- name: Copy base Caddyfile
  template:
    src: Caddyfile.j2
    dest: /opt/caddy/Caddyfile

- name: Clean existing modular configs to prevent duplicates
  file:
    path: /opt/caddy/conf.d/
    state: absent

- name: Ensure Caddy conf.d directory exists
  ansible.builtin.file:
    path: /opt/caddy/conf.d
    state: directory
    mode: '0755'

- name: Generate modular Caddy configs for all apps
  template:
    src: app.conf.j2
    dest: "/opt/caddy/conf.d/{{ item }}.conf"
  loop: "{{ groups['all'] }}"
  when: hostvars[item]['services'] is defined

- name: Gracefully reload Caddy to apply new routes
  command: docker exec caddy caddy reload --config /etc/caddy/Caddyfile
  register: caddy_reload
  until: caddy_reload.rc == 0
  retries: 5
  delay: 3
