---
- name: Remove No-Subscription Pop-up nag
  hosts: pve
  become: yes
  tasks:
    - name: Remove Proxmox 7 & 8 Subscription Nag
      replace:
        path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
        regexp: 'res\.data\.status\.toLowerCase\(\) !== ''active'''
        replace: 'false'
      notify: Restart PVE Proxy

    - name: Remove Proxmox 9.x Subscription Nag
      replace:
        path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
        regexp: 'if \(res\.data\.status\.toLowerCase\(\) !== ''active''\) \{'
        replace: 'if (false) {'
      notify: Restart PVE Proxy
